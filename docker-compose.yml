version: "3.9"

# ============================================================
# docker-compose.yml — Orquestación del Discord TTS Bot
#
# Uso:
#   Producción:   docker compose up -d
#   Desarrollo:   docker compose --profile dev up
#   Logs:         docker compose logs -f bot
#   Detener:      docker compose down
# ============================================================

services:

  # ── Servicio principal del bot (producción) ──────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: discord-tts-bot:latest
    container_name: discord-tts-bot
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - NODE_ENV=production

    # Montamos /tmp como tmpfs en memoria para los archivos MP3 temporales de TTS
    tmpfs:
      - /tmp:size=64m,mode=1777

    # Límites de recursos
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
          cpus: "0.25"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "pgrep", "-f", "node dist/index.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Servicio de desarrollo (hot-reload con ts-node) ───────
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: discord-tts-bot:dev
    container_name: discord-tts-bot-dev
    profiles: ["dev"]

    env_file:
      - .env

    environment:
      - NODE_ENV=development
      - DEBUG=true

    volumes:
      # Montar código fuente para hot-reload
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro

    tmpfs:
      - /tmp:size=64m,mode=1777

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
